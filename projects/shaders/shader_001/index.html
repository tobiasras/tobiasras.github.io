    <style>

            height: 100%;
            height: 100dvh;
            overflow: hidden;

            background: #000;

        }

        .sketch-stage {
            position: fixed;
            inset: 0;

        }

            inset: 0;

            top: 0;
            left: 0;
            z-index: 10;

            font-size: clamp(1.5rem, 4vw, 2.5rem);

            line-height: 1.1;
            color: #fff;
            pointer-events: none;
            text-shadow: 0 1px 12px rgba(0, 0, 0, 0.85);
        }

        .nav-link {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);

            z-index: 10;

            font-family: "consolas", sans-serif;
            font-size: 1rem;
            color: #fff;
            text-decoration: underline;

            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.2);

            transition: background 0.2s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .prev {
            left: 1.5rem;
        }
        .next {
            right: 1.5rem;
        }

    </style>
